name: sparsedrivev2_eval_navsimv1

cluster_resources:
  num_gpus: 1
  gpu_machine_type: a100.8
  preemptible: always
  customer_resource: research
  allowed_regions:
    - us-chicago-1

workload_variant_config:
  workload_type: generic
  entrypoint_fn: lilypad_entrypoint.eval_entrypoint_fn
  entrypoint_fn_config:
    num_gpus: 1
    dataset_version: "v1"
    experiment_name: "sparsedrive_navsimv1_eval"
    pretrained_checkpoint: "v1"

    test_cache_s3_path: null
    metric_cache_s3_path: null
    navsim_logs_s3_path: "s3://research-datasets/users/ishaan_rawal/navsim/navsim_logs/test"
    dataset_s3_path: "s3://research-datasets/users/ishaan_rawal/navsim"

    test_cache_s3_output: "s3://tejan-experiments/sparsedrivev2/test_cache_v1"
    metric_cache_s3_output: "s3://tejan-experiments/sparsedrivev2/metric_cache_v1"

    results_s3_output: "s3://tejan-experiments/sparsedrivev2/results"

    batch_size: 8
    extra_overrides: []

runtime_environment:
  code_assets:
    root_directory: /home/tejan/SparseDriveV2
    pip_requirements_path: requirements_lilypad.txt
    regex_excludes:
      - "^/\\.git/"
      - "/__pycache__/"
      - "\\.egg-info/"
      - "\\.so$"
      - "\\.pyc$"
      - "^/\\.venv/"
      - "^/build/"
      - "^/wandb/"
      - "^/exp/"
      - "\\.log$"
      - "\\.safetensors$"
      - "\\.tar\\.gz$"
      - "^/weights/"
      - "^/ckpt/kmeans/"
      - "\\.pkl$"
      - "^/vis/"
      - "^/assets/"
      - "^/dataset/"
    max_file_size_mb: 50

  required_environment_variables:
    - AWS_ACCESS_KEY_ID
    - AWS_SECRET_ACCESS_KEY
    - OCI_PHX_ACCESS_KEY_ID
    - OCI_PHX_SECRET_ACCESS_KEY

  constant_environment_variables:
    AWS_REQUEST_CHECKSUM_CALCULATION: "when_required"
    AWS_RESPONSE_CHECKSUM_VALIDATION: "when_required"
    AWS_ENDPOINT_URL: "https://idskhu5vqvtl.compat.objectstorage.us-chicago-1.oraclecloud.com"
    AWS_ENDPOINT_URL_S3: "https://idskhu5vqvtl.compat.objectstorage.us-chicago-1.oraclecloud.com"
    AWS_DEFAULT_REGION: "us-chicago-1"
    AWS_REGION: "us-chicago-1"
    TORCH_CUDA_ARCH_LIST: "8.0"
    PATH: /usr/local/cuda/bin:$PATH
    LD_LIBRARY_PATH: /usr/local/cuda/lib64:$LD_LIBRARY_PATH
    HYDRA_FULL_ERROR: "1"
    PYTHONUNBUFFERED: "1"
